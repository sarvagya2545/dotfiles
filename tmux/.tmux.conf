# set -g default-terminal "tmux-256color"
set -g default-terminal "${TERM}"
set -as terminal-features ",xterm-256color:RGB:clipboard"
set -g set-clipboard on
set -g allow-passthrough on
set -g visual-activity off
set-option -g focus-events on

set -g mouse on
setw -g mode-keys vi

set -sg escape-time 0

# copy mode keybindings
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# window and pane numbering 
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# prefix key
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# bindings
unbind r
bind r source-file ~/.tmux.conf \; display-message "Config Reloaded"

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"

unbind %
bind | split-window -h -c "#{pane_current_path}"

# Easy resizing (does not conflict with vim-tmux-navigator)
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r h resize-pane -L 5
bind -r l resize-pane -R 5

# Maximize the current pane
bind -r m resize-pane -Z

# window reordering in current session
bind-key -n C-M-Left swap-window -t -1\; select-window -t -1
bind-key -n C-M-Right swap-window -t +1\; select-window -t +1

# switch to the previous tmux session
bind-key Tab switch-client -l 

# tmux sessionizer
bind -n C-f popup -E tmux-sessionizer
bind f popup -E tmux-sessionizer
bind -r t popup -E -d "#{pane_current_path}" -h 75% -w 75%
bind -r C-t popup -E -h 90% -w 90% top

# Set this variable to use later
set -g @USER "#(whoami)"

# CUSTOM THEME
# Styles
set -g @blue "#65D1FF"
set -g @green "#3EFFDC"
set -g @violet "##FF61EF"
set -g @yellow "#FFDA7B"
set -g @red "#FF4A4A"
set -g @fg "#c3ccdc"
set -g @bg "#112638"
set -g @inactive_bg "#2c3043"
set -g @gray_light "#D8DEE9"
set -g @gray_medium "#ABB2BF"
set -g @gray_dark "#3B4252"
set -g @blue_muted "#81A1C1"
set -g @bg_dark "#011423"
set -g @bg_dark_new "#011628"
set -g @bg_highlight "#143652"
set -g @bg_search "#0A64AC"

set -g status-position bottom
set -g status-style "fg=#{@gray_light},bg=default"

# ============================================================
# STATUS BAR CONFIG
# ============================================================

# ---- Toggles (on = 1, off = 0) ----
set -g @mod_session   1
set -g @mod_command   0
set -g @mod_path      0
set -g @mod_cpu       1
set -g @mod_ram       1
set -g @mod_battery   0
set -g @mod_date      1

# ---- Date format & timezone ----
set -g @date_tz     "Asia/Kolkata"
set -g @date_fmt   "%d/%m %I:%M %p"

# ---- Separator (reused everywhere) ----
set -g @sep "#[fg=#{@inactive_bg},bg=default]| "

# ---- Icons ----
set -g @i_tmux    ""
set -g @i_cmd     ""
set -g @i_dir     ""
set -g @i_cpu     "󰍛"
set -g @i_ram     ""
set -g @i_battery "󱐋"
set -g @i_cal     ""
set -g @i_zoom    "󰊓"

# ---- Compose: module content inlined into each toggle conditional ----
# note: this section was taken and modified from https://github.com/catppuccin/tmux/discussions/317#discussioncomment-11064512
set -g status-left-length 100
set -g status-left "\
#{E:#{?#{==:#{@mod_session},1},#{?client_prefix,#[fg=#{@violet}#,bold#,bg=default] #{@i_tmux} #S,#[fg=#{@green}#,bold#,bg=default] #{@i_tmux} #S} ,}}\
#{E:#{?#{==:#{@mod_command},1},#{@sep}#[fg=#{@blue}#,bold#,bg=default]#{@i_cmd}  #{pane_current_command} ,}}\
#{E:#{?#{==:#{@mod_path},1},#{@sep}#[fg=#{@blue}#,bold#,bg=default]#{@i_dir}  #{=/-32/...:#{s|#{@USER}|~|:#{b:pane_current_path}}} ,}}\
#{?window_zoomed_flag,#{E:#{@sep}}#[fg=#{@yellow}#,bold#,bg=default]#{E:#{@i_zoom}} zoom ,}\
"

set -g status-right-length 100
set -g status-right "\
#{E:#{?#{==:#{@mod_cpu},1},#[fg=#{@blue}#,bg=default] #{@i_cpu} #{cpu_percentage} #{@sep},}}\
#{E:#{?#{==:#{@mod_ram},1},#[fg=#{@green}#,bg=default]#{@i_ram}  #{ram_percentage} #{@sep},}}\
#{E:#{?#{==:#{@mod_battery},1},#{?#{e|>=:10,#{battery_percentage}},#[bg=default#,fg=#{@red}],#[bg=default#,fg=#{@green}]}#{@i_battery} #{battery_percentage} #{@sep},}}\
#{E:#{?#{==:#{@mod_date},1},#[fg=#{@blue}#,bold#,bg=default]#{@i_cal}  #(TZ='#{@date_tz}' date +'#{@date_fmt}') ,}}\
"

set -g status-interval 5
set -g window-status-current-format "#[fg=#{@blue},bold] #[underscore]#I:#W"
set -g window-status-format " #I:#W"
set -g status-justify absolute-centre
set -g message-style "fg=#{@blue},bg=#{@bg_dark_new}"
set -g mode-style "fg=#{@gray_dark},bg=#{@blue_muted}"
set -g pane-border-style "fg=#{@gray_dark}"
set -g pane-active-border-style "fg=#{@gray_medium}"


# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TPM (Keep this at the bottom)
run '~/.tmux/plugins/tpm/tpm'
